services:
  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_SHOP_NAME: ${SHOP_NAME:-<<< SHOP_NAME >>>}
      NEXT_PUBLIC_SHOP_DISCORD_URL: ${SHOP_DISCORD_URL:-<<< DISCORD_INVITE_URL >>>}
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/payment_portal
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:4000}
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - jfa-go

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  jfa-go:
    image: hrfee/jfa-go:latest
    ports:
      - "8056:8056"
    volumes:
      - jfa_go_data:/data

volumes:
  postgres_data:
  jfa_go_data:
