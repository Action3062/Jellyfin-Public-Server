services:
  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
      args:
        API_URL: http://api:4000
        NEXT_PUBLIC_SHOP_NAME: ${SHOP_NAME:-<<< SHOP_NAME >>>}
        NEXT_PUBLIC_SHOP_DISCORD_URL: ${SHOP_DISCORD_URL:-<<< DISCORD_INVITE_URL >>>}
        NEXT_PUBLIC_PLEX_ENABLED: ${PLEX_ENABLED:-false}
        NEXT_PUBLIC_AZTECO_ENABLED: ${AZTECO_ENABLED:-false}
    environment:
      API_URL: http://api:4000
      NEXT_PUBLIC_SHOP_NAME: ${SHOP_NAME:-<<< SHOP_NAME >>>}
      NEXT_PUBLIC_SHOP_DISCORD_URL: ${SHOP_DISCORD_URL:-<<< DISCORD_INVITE_URL >>>}
      NEXT_PUBLIC_PLEX_ENABLED: ${PLEX_ENABLED:-false}
      NEXT_PUBLIC_AZTECO_ENABLED: ${AZTECO_ENABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/payment_portal
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:4000}
    ports:
      - "4000:4000"
    # jfa-go runs as its own container on this host. Reach it via the host gateway
    # (works if jfa-go publishes port 8056). Alternatively, attach this service to
    # jfa-go's docker network and set JFA_GO_BASE_URL to http://<jfa-go-container>:8056.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: payment_portal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bound to localhost only — not reachable from outside the host. Remove this
    # mapping entirely if no host-side DB access is needed.
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    # Bound to localhost only. To require a password, add:
    #   command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    # and set REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379 for the api service.
    ports:
      - "127.0.0.1:6379:6379"

# jfa-go runs as its own container on this host (managed separately, not in this stack).
# The API reaches it via JFA_GO_BASE_URL in .env (default: http://host.docker.internal:8056).

volumes:
  postgres_data:
